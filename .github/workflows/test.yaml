name: run test

on:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        runner: [ macos-latest, ubuntu-latest ]
        node-version: [ '20', '22', '24' ]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm test
